name: CI (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build macOS app
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.6
        run: |
          XCODE_APP=/Applications/Xcode_26.6.app
          if [ ! -d "$XCODE_APP" ]; then
            echo "::error::$XCODE_APP not found on this runner. Installed Xcodes:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -switch "$XCODE_APP"

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: |
          set -o pipefail
          FORMATTER=cat
          if command -v xcbeautify >/dev/null 2>&1; then FORMATTER=xcbeautify; fi
          xcodebuild build \
            -project MotPop.xcodeproj \
            -scheme MotPop \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | "$FORMATTER"
