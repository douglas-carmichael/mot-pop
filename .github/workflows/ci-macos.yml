name: CI (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: |
          set -o pipefail
          FORMATTER=cat
          if command -v xcbeautify >/dev/null 2>&1; then FORMATTER=xcbeautify; fi
          xcodebuild build \
            -project MotPop.xcodeproj \
            -scheme MotPop \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | "$FORMATTER"
